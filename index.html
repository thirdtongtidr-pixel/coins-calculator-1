<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Coins Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4f0;
    --surface: #ffffff;
    --surface2: #fdf8f4;
    --border: #ede5db;
    --border2: #e0d4c5;
    --orange: #f26522;
    --orange2: #e05510;
    --orange-light: #fff0e8;
    --orange-mid: #fde0cc;
    --text: #2a1f14;
    --text-muted: #9e8a78;
    --green: #2eab6e;
    --green-bg: #edfaf4;
    --shadow: rgba(242,101,34,0.10);
    --shadow-sm: rgba(42,31,20,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 20px 80px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 340px;
    background: linear-gradient(160deg, #fff5ee 0%, #fde8d4 40%, #f7f4f0 100%);
    z-index: 0;
  }

  .container { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeDown 0.5s ease both;
  }
  .coin-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 76px; height: 76px;
    background: linear-gradient(145deg, #f9a264, #f26522);
    border-radius: 24px;
    font-size: 36px;
    box-shadow: 0 8px 32px rgba(242,101,34,0.3), 0 2px 8px rgba(242,101,34,0.15);
    margin-bottom: 20px;
    transform: rotate(-4deg);
    transition: transform 0.3s;
    cursor: default;
  }
  .coin-icon:hover { transform: rotate(0deg) scale(1.06); }

  h1 { font-size: 2rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 8px; }
  h1 span { color: var(--orange); }
  .subtitle { color: var(--text-muted); font-size: 0.95rem; font-weight: 300; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 20px;
    box-shadow: 0 2px 16px var(--shadow-sm);
    animation: fadeUp 0.45s ease both;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 520px) { .settings-row { grid-template-columns: 1fr; } }

  .field-group { display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 0.83rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.3px; }
  label span { color: var(--orange); }

  input[type="number"] {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 4px rgba(242,101,34,0.1);
    background: #fff;
  }

  /* ITEMS */
  .items-header { display: flex; align-items: center; justify-content: space-between; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    transition: all 0.2s;
  }
  .btn-add {
    background: var(--orange);
    color: #fff;
    box-shadow: 0 4px 16px rgba(242,101,34,0.28);
  }
  .btn-add:hover {
    background: var(--orange2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(242,101,34,0.35);
  }
  .btn-remove {
    background: #fff0f0;
    border: 1px solid #fcd0d0;
    color: #d94f4f;
    padding: 7px 10px;
    font-size: 0.8rem;
    border-radius: 9px;
  }
  .btn-remove:hover { background: #ffe0e0; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .col-header {
    display: grid;
    grid-template-columns: 44px 1fr 140px 140px 100px 36px;
    gap: 12px;
    padding: 0 4px 10px;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  @media (max-width: 650px) { .col-header { display: none; } }

  .items-table { display: grid; gap: 10px; }

  .item-row {
    display: grid;
    grid-template-columns: 44px 1fr 140px 140px 100px 36px;
    gap: 12px;
    align-items: center;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    animation: slideIn 0.25s ease both;
  }
  .item-row:hover {
    border-color: #f4c4a6;
    box-shadow: 0 4px 16px var(--shadow);
    transform: translateY(-1px);
  }

  .item-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--orange);
    background: var(--orange-light);
    border-radius: 8px;
    padding: 5px 8px;
    text-align: center;
  }

  .item-name-input {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border2);
    padding: 4px 0;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .item-name-input:focus { border-bottom-color: var(--orange); }
  .item-name-input::placeholder { color: #c8bdb4; font-weight: 400; font-style: italic; }

  .item-num-input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
    text-align: center;
  }
  .item-num-input::-webkit-inner-spin-button,
  .item-num-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .item-num-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(242,101,34,0.1);
  }

  .item-delta {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    text-align: center;
    padding: 6px 10px;
    border-radius: 8px;
  }
  .item-delta.positive { color: #2eab6e; background: #edfaf4; }
  .item-delta.zero { color: var(--text-muted); background: none; }
  .item-delta.done { color: var(--orange); background: var(--orange-light); font-size: 0.78rem; }

  /* RESULT */
  .result-card {
    background: linear-gradient(145deg, var(--orange) 0%, #e84e0e 100%);
    border-radius: 24px;
    padding: 40px 44px;
    margin-top: 28px;
    text-align: center;
    animation: fadeUp 0.5s ease 0.15s both;
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(242,101,34,0.3), 0 4px 16px rgba(242,101,34,0.2);
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 260px; height: 260px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    pointer-events: none;
  }
  .result-card::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    pointer-events: none;
  }

  .result-label {
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-bottom: 12px;
    position: relative; z-index: 1;
  }
  .result-number {
    font-family: 'Space Mono', monospace;
    font-size: 5rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    text-shadow: 0 4px 24px rgba(0,0,0,0.12);
    position: relative; z-index: 1;
    margin-bottom: 4px;
    transition: all 0.25s ease;
  }
  .result-unit {
    font-size: 1.1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    margin-bottom: 28px;
    position: relative; z-index: 1;
  }

  .formula-box {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    padding: 16px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.85);
    line-height: 1.9;
    text-align: left;
    max-width: 520px;
    margin: 0 auto;
    position: relative; z-index: 1;
  }
  .formula-box .hl { color: #fff; font-weight: 700; }
  .formula-box .op { color: rgba(255,255,255,0.55); }

  .breakdown {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    position: relative; z-index: 1;
  }
  .breakdown-chip {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.8);
  }
  .breakdown-chip strong { color: #fff; }

  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; }
  .empty-state .icon { font-size: 2rem; margin-bottom: 10px; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pop {
    0%   { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .number-pop { animation: pop 0.25s ease; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="coin-icon">🪙</div>
    <h1>Campaign <span>Coins</span> Calculator</h1>
    <p class="subtitle">คำนวณจำนวน Coins ที่ร้านต้องเตรียมสำหรับแคมเปญรีวิว</p>
  </div>

  <div class="card" style="animation-delay:0.05s">
    <div class="card-title">⚙ ตั้งค่าแคมเปญ</div>
    <div class="settings-row">
      <div class="field-group">
        <label>เป้าหมายรีวิวต่อสินค้า <span>(ค่าเริ่มต้น)</span></label>
        <input type="number" id="defaultTarget" value="20" min="0">
      </div>
      <div class="field-group">
        <label>Coins ต่อ 1 รีวิวคุณภาพ <span>🪙</span></label>
        <input type="number" id="coinsPerReview" value="2" min="1">
      </div>
    </div>
  </div>

  <div class="card" style="animation-delay:0.12s">
    <div class="items-header">
      <div class="card-title" style="margin-bottom:0;flex:1">📦 สินค้าในแคมเปญ</div>
      <button class="btn btn-add" onclick="addItem()">＋ เพิ่มสินค้า</button>
    </div>
    <div class="divider"></div>
    <div class="col-header">
      <span>#</span>
      <span>ชื่อสินค้า</span>
      <span style="text-align:center">เป้าหมาย</span>
      <span style="text-align:center">มีอยู่แล้ว</span>
      <span style="text-align:center">ต้องการเพิ่ม</span>
      <span></span>
    </div>
    <div id="itemsList" class="items-table"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">📭</div>
      <div>ยังไม่มีสินค้า — กดปุ่ม "เพิ่มสินค้า" เพื่อเริ่มต้น</div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-label">⬡ ยอด Coins รวมที่ร้านต้องเตรียม</div>
    <div class="result-number" id="totalCoins">0</div>
    <div class="result-unit">Coins</div>
    <div class="formula-box" id="formulaBox">
      <span style="color:rgba(255,255,255,0.5)">เพิ่มสินค้าเพื่อดูการคำนวณ</span>
    </div>
    <div class="breakdown" id="breakdown"></div>
  </div>

</div>
<script>
let items = [], idCounter = 0;

window.onload = () => {
  renderItems(); calculate();
};

function addItem(name='', existing=0) {
  items.push({id:++idCounter, name, target:null, existing});
  renderItems(); calculate();
}
function removeItem(id) {
  items = items.filter(i=>i.id!==id); renderItems(); calculate();
}
function getDefaultTarget() { return parseInt(document.getElementById('defaultTarget').value)||0; }

function renderItems() {
  const list = document.getElementById('itemsList');
  const empty = document.getElementById('emptyState');
  if (!items.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  const def = getDefaultTarget();
  list.innerHTML = items.map((item,idx) => {
    const t = item.target!==null ? item.target : def;
    const d = Math.max(0, t-(item.existing||0));
    const cls = d>0?'positive':(d===0&&t>0?'done':'zero');
    const lbl = d>0?`+${d}`:(cls==='done'?'✓ ครบ':'0');
    return `<div class="item-row" id="row-${item.id}">
      <div class="item-num">S${String(idx+1).padStart(2,'0')}</div>
      <input class="item-name-input" placeholder="ชื่อสินค้า..." value="${esc(item.name)}"
        oninput="upd(${item.id},'name',this.value)">
      <input type="number" class="item-num-input" placeholder="${def}"
        value="${item.target!==null?item.target:''}" min="0"
        oninput="upd(${item.id},'target',this.value)">
      <input type="number" class="item-num-input"
        value="${item.existing||0}" min="0"
        oninput="upd(${item.id},'existing',this.value)">
      <div class="item-delta ${cls}">${lbl}</div>
      <button class="btn btn-remove" onclick="removeItem(${item.id})">✕</button>
    </div>`;
  }).join('');
}

function upd(id, field, value) {
  const item = items.find(i=>i.id===id); if(!item) return;
  if(field==='target') item.target = value===''?null:Math.max(0,parseInt(value)||0);
  else if(field==='existing') item.existing = Math.max(0,parseInt(value)||0);
  else item[field]=value;
  // update deltas in place
  const def = getDefaultTarget();
  items.forEach(it => {
    const t = it.target!==null?it.target:def;
    const d = Math.max(0,t-(it.existing||0));
    const cls = d>0?'positive':(d===0&&t>0?'done':'zero');
    const lbl = d>0?`+${d}`:(cls==='done'?'✓ ครบ':'0');
    const el = document.querySelector(`#row-${it.id} .item-delta`);
    if(el){el.className=`item-delta ${cls}`;el.textContent=lbl;}
  });
  calculate();
}

function calculate() {
  const def = getDefaultTarget();
  const cpr = parseFloat(document.getElementById('coinsPerReview').value)||0;
  const deltas = items.map(it=>Math.max(0,(it.target!==null?it.target:def)-(it.existing||0)));
  const total = deltas.reduce((a,b)=>a+b,0);
  const coins = total*cpr;
  const val = coins%1===0?coins:coins.toFixed(1);
  const el = document.getElementById('totalCoins');
  if(el.textContent!==String(val)){
    el.textContent=val;
    el.classList.remove('number-pop'); void el.offsetWidth; el.classList.add('number-pop');
  }
  const fb=document.getElementById('formulaBox'), bd=document.getElementById('breakdown');
  if(!items.length){
    fb.innerHTML=`<span style="color:rgba(255,255,255,0.5)">เพิ่มสินค้าเพื่อดูการคำนวณ</span>`;
    bd.innerHTML=''; return;
  }
  const parts = deltas.map(d=>`<span class="hl">${d}</span>`).join(' <span class="op">+</span> ');
  fb.innerHTML=`<div>( ${parts} ) <span class="op">×</span> <span class="hl">${cpr}</span> coins/รีวิว</div>
    <div style="margin-top:6px">= <span class="hl">${total}</span> รีวิว <span class="op">×</span> <span class="hl">${cpr}</span> = <span class="hl">${val} coins</span></div>`;
  bd.innerHTML=items.map((it,i)=>{
    const t=it.target!==null?it.target:def;
    return `<div class="breakdown-chip">${esc(it.name||`Item ${i+1}`)}: ${t}−${it.existing||0} = <strong>+${deltas[i]}</strong></div>`;
  }).join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.getElementById('defaultTarget').addEventListener('input',()=>{renderItems();calculate();});
document.getElementById('coinsPerReview').addEventListener('input',calculate);
</script>
</body>
</html>
